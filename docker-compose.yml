version: '3.9'

services:
  mongo:
    image: mongo:7
    container_name: bds-mongo
    restart: unless-stopped
    ports:
      - "27017:27017"
    volumes:
      - mongo-data:/data/db

  server:
    build:
      context: ./server
      dockerfile: Dockerfile
    container_name: bds-server
    restart: unless-stopped
    environment:
      - MONGO_URI=mongodb://mongo:27017/bds
      - PORT=4000
    ports:
      - "4000:4000"
    depends_on:
      - mongo
    volumes:
      - ./server:/usr/src/app
      - /usr/src/app/node_modules

  client:
    build:
      context: ./client
      dockerfile: Dockerfile
    container_name: bds-client
    restart: unless-stopped
    environment:
      - VITE_API_BASE_URL=http://localhost:4000/api
    ports:
      - "5173:5173"
    depends_on:
      - server
    volumes:
      - ./client:/usr/src/app
      - /usr/src/app/node_modules

volumes:
  mongo-data:


